services:
  fastapi:
    build: .
    container_name: fastapi
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PW}
      MYSQL_DATABASE: ${RDS_DB_NAME}
      MONGO_PW: "${MONGO_PW}"
    expose:
      - "8000"
    networks:
      - aqua_network

  nginx:
    image: nginx:latest
    container_name: nginx
    depends_on:
      - fastapi
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt
      - ./data:/var/www/certbot
    ports:
    - "80:80"
    - "443:443"

    networks:
      - aqua_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PW}
      MYSQL_DATABASE: ${RDS_DB_NAME}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aqua_network

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certs:/etc/letsencrypt
      - ./data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - aqua_network

volumes:
  mysql_data:

networks:
  aqua_network:
    driver: bridge
